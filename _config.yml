theme: jekyll-theme-chirpy

lang: en
timezone: Asia/Ho_Chi_Minh

title: Vũ Văn Nam
tagline: Cybersecurity Student @ HUST | Web Security Researcher

description: >-
  Security write-ups, bug bounty reports, and web application security research
  by Vũ Văn Nam — Cybersecurity student at Hanoi University of Science and Technology.

url: "https://vuvannam12082005.github.io"
baseurl: ""

github:
  username: vuvannam12082005

social:
  name: Vũ Văn Nam
  email: Nam.VV235610@sis.hust.edu.vn
  links:
    - https://github.com/vuvannam12082005
    - https://www.linkedin.com/in/nam-v%C5%A9-v%C4%83n-737b21394

theme_mode: dark

avatar: https://github.com/vuvannam12082005.png

toc: true
comments: false

paginate: 10

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      comments: false
      toc: true
      permalink: /posts/:title/

jekyll-archives:
  enabled: [categories, tags]
  layouts:
    category: category
    tag: tag
  permalinks:
    tag: /tags/:name/
    category: /categories/:name/

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-archives
  - jekyll-redirect-from
  - jekyll-paginate

sass:
  style: compressed

compress_html:
  clippings: all
  comments: all
  endings: all
  profile: false
  blanklines: false
  ignore:
    envs: [development]

